apiVersion: camel.apache.org/v1
kind: Kamelet
metadata:
  name: icp-mcp-rest-service
spec:
  definition:
    title: Internet Computer MCP REST Service
    description: >-
      Sample-local copy of the reusable ICP MCP REST kamelet so Camel Main can
      instantiate it directly during local development.
    type: object
    properties:
      restComponent:
        title: REST Component
        type: string
        default: undertow
      restHost:
        title: REST Host
        type: string
        default: 0.0.0.0
      restPort:
        title: REST Port
        type: integer
        default: 8080
      restContextPath:
        title: REST Context Path
        type: string
        default: /mcp
      toolsCallBean:
        title: Tools Call Bean
        type: string
        default: icpBusinessToolsCall
      resourcesGetBean:
        title: Resources Get Bean
        type: string
        default: mcpResourcesGet
      replicaUrl:
        title: Replica URL
        type: string
        default: http://127.0.0.1:4943/
      canisterId:
        title: Canister Id
        type: string
      didResource:
        title: DID Resource
        type: string
        default: /candid/service.did
      defaultPojoClass:
        title: Default POJO Class
        type: string
  dependencies:
    - "camel:{{restComponent}}"
    - "camel:undertow"
    - "camel:bean"
  template:
    from:
      uri: "{{restComponent}}:http://{{restHost}}:{{restPort}}{{restContextPath}}?matchOnUriPrefix=true"
      steps:
        - setProperty:
            name: icp.mcp.location
            constant: "{{replicaUrl}}"
        - setProperty:
            name: icp.mcp.canisterId
            constant: "{{canisterId}}"
        - setProperty:
            name: icp.mcp.didResource
            constant: "{{didResource}}"
        - setProperty:
            name: icp.mcp.defaultPojoClass
            constant: "{{defaultPojoClass}}"
        - choice:
            when:
              - simple: "${header.CamelHttpMethod} == 'GET' && ${header.CamelHttpPath} endsWith '/health'"
                steps:
                  - bean:
                      beanType: io.dscope.camel.mcp.processor.McpHealthStatusProcessor
                      method: process
                  - setHeader:
                      name: Content-Type
                      constant: application/json
                  - convertBodyTo:
                      type: java.lang.String
              - simple: "${header.CamelHttpMethod} == 'GET' && ${header.CamelHttpPath} endsWith '/stream'"
                steps:
                  - bean:
                      beanType: io.dscope.camel.mcp.processor.McpStreamProcessor
                      method: process
              - simple: "${header.CamelHttpMethod} == 'POST'"
                steps:
                  - doTry:
                      steps:
                        - bean:
                            beanType: io.dscope.camel.mcp.processor.McpJsonRpcEnvelopeProcessor
                            method: process
                        - choice:
                            when:
                              - simple: "${exchangeProperty[mcp.jsonrpc.type]} == 'NOTIFICATION'"
                                steps:
                                  - bean:
                                      beanType: io.dscope.camel.mcp.processor.McpNotificationProcessor
                                      method: process
                                  - choice:
                                      when:
                                        - simple: "${exchangeProperty[mcp.notification.type]} == 'initialized'"
                                          steps:
                                            - bean:
                                                beanType: io.dscope.camel.mcp.processor.McpNotificationsInitializedProcessor
                                                method: process
                                      otherwise:
                                        steps:
                                          - bean:
                                              beanType: io.dscope.camel.mcp.processor.McpNotificationAckProcessor
                                              method: process
                              - simple: "${exchangeProperty[mcp.jsonrpc.method]} == 'initialize'"
                                steps:
                                  - bean:
                                      beanType: io.dscope.camel.mcp.processor.McpInitializeProcessor
                                      method: process
                              - simple: "${exchangeProperty[mcp.jsonrpc.method]} == 'ping'"
                                steps:
                                  - bean:
                                      beanType: io.dscope.camel.mcp.processor.McpPingProcessor
                                      method: process
                              - simple: "${exchangeProperty[mcp.jsonrpc.method]} == 'tools/list'"
                                steps:
                                  - bean:
                                      beanType: org.ic4j.camel.mcp.processor.IcpMcpToolsListProcessor
                                      method: process
                              - simple: "${exchangeProperty[mcp.jsonrpc.method]} == 'tools/call'"
                                steps:
                                  - choice:
                                      when:
                                        - simple: "${exchangeProperty.mcp.tool.name} regex 'schema-from-endpoint|schema-from-did|schema-catalog-from-endpoint|schema-catalog-from-did|schema-from-pojo'"
                                          steps:
                                            - bean:
                                                beanType: org.ic4j.camel.mcp.processor.IcpMcpSchemaToolCallProcessor
                                                method: process
                                      otherwise:
                                        steps:
                                          - bean:
                                              beanType: org.ic4j.sample.mcp.SampleIcpBusinessToolsCallProcessor
                                              method: process
                              - simple: "${exchangeProperty[mcp.jsonrpc.method]} == 'resources/list'"
                                steps:
                                  - bean:
                                      beanType: io.dscope.camel.mcp.processor.McpResourcesListProcessor
                                      method: process
                              - simple: "${exchangeProperty[mcp.jsonrpc.method]} == 'resources/read'"
                                steps:
                                  - bean:
                                      beanType: io.dscope.camel.mcp.processor.McpResourcesReadProcessor
                                      method: process
                              - simple: "${exchangeProperty[mcp.jsonrpc.method]} == 'resources/get'"
                                steps:
                                  - bean:
                                      beanType: io.dscope.camel.mcp.processor.McpResourcesGetProcessor
                                      method: process
                            otherwise:
                              steps:
                                - setProperty:
                                    name: mcp.error.code
                                    constant: "-32601"
                                - setProperty:
                                    name: mcp.error.message
                                    simple: "Unsupported MCP method: ${exchangeProperty[mcp.jsonrpc.method]}"
                                - bean:
                                    beanType: io.dscope.camel.mcp.processor.McpErrorProcessor
                                    method: process
                      doCatch:
                        - exception:
                            - java.lang.IllegalArgumentException
                          steps:
                            - setHeader:
                                name: CamelHttpResponseCode
                                constant: "400"
                            - setProperty:
                                name: mcp.error.code
                                constant: "-32600"
                            - setProperty:
                                name: mcp.error.message
                                simple: "${exception.message}"
                            - bean:
                                beanType: io.dscope.camel.mcp.processor.McpErrorProcessor
                                method: process